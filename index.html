<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee | Operations Incidents Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --shopee-orange: #ee4d2d;
            --shopee-orange-glow: rgba(238, 77, 45, 0.15);
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --bg-input: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            font-size: 13px;
        }

        .shopee-header {
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .card-master {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .input-premium {
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0 12px;
            width: 100%;
            background: var(--bg-input);
            color: var(--text-main);
            transition: all 0.2s;
        }

        .input-premium:focus {
            border-color: var(--shopee-orange);
            outline: none;
            box-shadow: 0 0 0 3px var(--shopee-orange-glow);
        }

        .btn-shopee {
            background: linear-gradient(135deg, #ee4d2d, #ff5722);
            color: white;
            font-weight: 700;
            height: 44px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .nav-tab {
            color: var(--text-dim);
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 6px;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-tab.active {
            background: var(--shopee-orange-glow);
            color: var(--shopee-orange);
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .kpi-value { font-size: 24px; font-weight: 800; }
        .kpi-label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); font-weight: 700; }

        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            height: 300px;
        }

        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #161b22; color: var(--text-dim); text-align: left; padding: 12px; font-size: 11px; text-transform: uppercase; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 12px; }

        .heatmap-grid { display: grid; grid-template-columns: 60px repeat(24, 1fr); gap: 2px; }
        .heatmap-cell { height: 25px; background: #161b22; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; }

        /* Loader */
        .loader {
            width: 16px; height: 16px;
            border: 2px solid #FFF; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="min-h-screen flex items-center justify-center">
    <div class="card-master w-full max-w-sm text-center">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fe/Shopee.svg" class="h-10 mx-auto mb-6">
        <h1 class="text-xl font-bold mb-6">Incidents Control</h1>
        <form onsubmit="handleLogin(event)">
            <input type="email" id="loginEmail" class="input-premium mb-4" placeholder="E-mail corporativo" required>
            <button type="submit" class="btn-shopee">Entrar</button>
        </form>
    </div>
</div>

<!-- INTERFACE -->
<div id="main-interface" class="hidden">
    <header class="shopee-header">
        <div class="flex items-center gap-2">
            <div class="bg-[#ee4d2d] text-white px-2 py-0.5 rounded font-black">S</div>
            <span class="font-bold uppercase tracking-tight">Operations Control</span>
        </div>
        <nav class="flex gap-2">
            <button onclick="switchTab('registro')" id="tab-registro" class="nav-tab active">REGISTRAR</button>
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="nav-tab">DASHBOARD</button>
        </nav>
        <button onclick="handleLogout()" class="text-slate-500 hover:text-red-500"><i class="fas fa-power-off"></i></button>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        
        <!-- REGISTRO -->
        <section id="section-registro" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 card-master">
                <h2 class="text-sm font-bold mb-6 text-orange-500 uppercase"><i class="fas fa-plus mr-2"></i>Nova Ocorrência</h2>
                <form id="incidentForm" onsubmit="handleRegister(event)">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="kpi-label">CD Operacional</label>
                            <select id="cd" class="input-premium mt-1" required>
                                <option value="BRFPE1">BRFPE1</option>
                                <option value="BRFSP1">BRFSP1</option>
                                <option value="BRFSP2">BRFSP2</option>
                                <option value="BRFGO1">BRFGO1</option>
                            </select>
                        </div>
                        <div>
                            <label class="kpi-label">Tipo de Ocorrência</label>
                            <select id="tipo" class="input-premium mt-1" required>
                                <option value="Queda de Energia">Queda de Energia</option>
                                <option value="Queda de Internet">Queda de Internet</option>
                                <option value="Esteira Parada">Esteira Parada</option>
                                <option value="Sistema Indisponível">Sistema Indisponível</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="kpi-label">Área</label>
                            <select id="area" class="input-premium mt-1" required>
                                <option value="INBOUND">INBOUND</option>
                                <option value="PICKING">PICKING</option>
                                <option value="CHECKING">CHECKING</option>
                                <option value="SHIPPING">SHIPPING</option>
                            </select>
                        </div>
                        <div>
                            <label class="kpi-label">Tempo Parado (min)</label>
                            <input type="number" id="tempo" class="input-premium mt-1" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="kpi-label">Descrição</label>
                        <textarea id="desc" class="input-premium mt-1 h-20 py-2 resize-none" required></textarea>
                    </div>
                    <button type="submit" id="btnSave" class="btn-shopee">Salvar Registro</button>
                </form>
            </div>
            <div class="card-master h-fit">
                <h3 class="kpi-label mb-4">Informações</h3>
                <div class="space-y-4">
                    <div class="flex justify-between border-b border-white/5 pb-2">
                        <span class="text-slate-500">Usuário:</span>
                        <span id="user-display" class="font-bold text-xs"></span>
                    </div>
                    <div class="flex justify-between border-b border-white/5 pb-2">
                        <span class="text-slate-500">Data:</span>
                        <span id="live-date"></span>
                    </div>
                </div>
            </div>
        </section>

        <!-- DASHBOARD -->
        <section id="section-dashboard" class="hidden space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="kpi-card">
                    <div><div class="kpi-label">Total Ocorrências</div><div id="kpi-total" class="kpi-value text-white">0</div></div>
                    <i class="fas fa-clipboard-list text-orange-500 text-2xl"></i>
                </div>
                <div class="kpi-card">
                    <div><div class="kpi-label">Total Downtime</div><div id="kpi-minutos" class="kpi-value text-red-500">0</div></div>
                    <i class="fas fa-clock text-red-500 text-2xl"></i>
                </div>
                <div class="kpi-card">
                    <div><div class="kpi-label">Média (min)</div><div id="kpi-media" class="kpi-value text-amber-500">0</div></div>
                    <i class="fas fa-hourglass-half text-amber-500 text-2xl"></i>
                </div>
                <div class="kpi-card">
                    <div><div class="kpi-label">CD Crítico</div><div id="kpi-setor" class="kpi-value text-purple-500">-</div></div>
                    <i class="fas fa-exclamation-triangle text-purple-500 text-2xl"></i>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="chart-container">
                    <h3 class="kpi-label mb-4">Incidentes por Tipo</h3>
                    <canvas id="chartTipos"></canvas>
                </div>
                <div class="chart-container">
                    <h3 class="kpi-label mb-4">Minutos por Área</h3>
                    <canvas id="chartImpacto"></canvas>
                </div>
            </div>

            <div class="card-master overflow-x-auto">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="kpi-label">Histórico Recente</h3>
                    <button onclick="syncData()" id="btnRefresh" class="text-[10px] bg-slate-800 px-3 py-1 rounded font-bold hover:bg-slate-700">ATUALIZAR</button>
                </div>
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th>Data/Hora</th>
                            <th>CD</th>
                            <th>E-mail</th>
                            <th>Tipo</th>
                            <th>Área</th>
                            <th>Tempo</th>
                            <th>Descrição</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="card-master">
                <h3 class="kpi-label mb-4">Incidência por Horário (Heatmap)</h3>
                <div id="heatmapContainer" class="overflow-x-auto"></div>
            </div>
        </section>
    </main>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyKbFNMvHsCOtIGlbcgcRcEFr3UhF7o5tXd1TGeu8V45r9HefID0ZQdW1vhiV0wSWg/exec";
    let rawData = [];
    const chartInstances = {};

    window.onload = () => {
        checkSession();
        document.getElementById('live-date').innerText = new Date().toLocaleDateString();
    };

    function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        sessionStorage.setItem("shopee_user", email);
        checkSession();
    }

    function checkSession() {
        const user = sessionStorage.getItem("shopee_user");
        if (user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-interface').classList.remove('hidden');
            document.getElementById('user-display').innerText = user;
        }
    }

    function handleLogout() {
        sessionStorage.clear();
        location.reload();
    }

    function switchTab(tab) {
        document.getElementById('section-registro').classList.toggle('hidden', tab !== 'registro');
        document.getElementById('section-dashboard').classList.toggle('hidden', tab !== 'dashboard');
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        if (tab === 'dashboard') syncData();
    }

    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSave');
        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span>';

        const payload = {
            timestamp: new Date().toLocaleString('pt-BR'),
            cd: document.getElementById('cd').value,
            email: sessionStorage.getItem("shopee_user"),
            tipoOcorrencia: document.getElementById('tipo').value,
            area: document.getElementById('area').value,
            tempoParado: document.getElementById('tempo').value,
            descricao: document.getElementById('desc').value
        };

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            alert("✅ Sucesso!");
            document.getElementById('incidentForm').reset();
        } catch (err) {
            alert("Erro ao salvar.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Salvar Registro";
        }
    }

    async function syncData() {
        const btn = document.getElementById('btnRefresh');
        btn.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i>';
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            
            // Mapeamento exato baseado nos nomes das colunas da planilha da imagem
            rawData = data.map(item => ({
                timestamp: item["Timestamp"] || "",
                cd: item["CD"] || "",
                email: item["E-mail"] || "",
                tipo: item["Tipo de Ocorrência"] || "",
                area: item["Área"] || "",
                tempo: parseFloat(item["Tempo Parado (min)"]) || 0,
                desc: item["Descrição"] || ""
            }));

            updateDashboard();
        } catch (err) {
            console.error(err);
        } finally {
            btn.innerText = "ATUALIZAR";
        }
    }

    function updateDashboard() {
        const total = rawData.length;
        const totalMin = rawData.reduce((acc, curr) => acc + curr.tempo, 0);
        
        document.getElementById('kpi-total').innerText = total;
        document.getElementById('kpi-minutos').innerText = totalMin + " min";
        document.getElementById('kpi-media').innerText = total > 0 ? (totalMin / total).toFixed(1) : 0;

        const cdCounts = {};
        rawData.forEach(r => cdCounts[r.cd] = (cdCounts[r.cd] || 0) + 1);
        document.getElementById('kpi-setor').innerText = Object.keys(cdCounts).reduce((a, b) => cdCounts[a] > cdCounts[b] ? a : b, "-");

        renderTable();
        renderCharts();
        renderHeatmap();
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = rawData.slice(-20).reverse().map(r => `
            <tr>
                <td class="text-slate-500 font-mono text-[10px]">${r.timestamp}</td>
                <td class="font-bold text-blue-400">${r.cd}</td>
                <td class="text-slate-400 text-[10px]">${r.email}</td>
                <td class="text-orange-500">${r.tipo}</td>
                <td class="text-purple-400 font-bold">${r.area}</td>
                <td class="font-bold text-red-500">${r.tempo}</td>
                <td class="truncate max-w-[200px] text-slate-400">${r.desc}</td>
            </tr>
        `).join('');
    }

    function renderCharts() {
        const tipos = {};
        rawData.forEach(r => tipos[r.tipo] = (tipos[r.tipo] || 0) + 1);
        createChart('chartTipos', 'bar', Object.keys(tipos), Object.values(tipos), '#ee4d2d');

        const areas = {};
        rawData.forEach(r => areas[r.area] = (areas[r.area] || 0) + r.tempo);
        createChart('chartImpacto', 'doughnut', Object.keys(areas), Object.values(areas), ['#2f81f7','#3fb950','#8957e5','#ee4d2d']);
    }

    function createChart(id, type, labels, data, color) {
        if (chartInstances[id]) chartInstances[id].destroy();
        const ctx = document.getElementById(id).getContext('2d');
        chartInstances[id] = new Chart(ctx, {
            type: type,
            data: {
                labels: labels,
                datasets: [{ data: data, backgroundColor: color, borderWidth: 0 }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#8b949e', font: { size: 10 } } } },
                scales: type === 'bar' ? {
                    y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                    x: { ticks: { color: '#8b949e' } }
                } : {}
            }
        });
    }

    function renderHeatmap() {
        const matrix = Array(7).fill(0).map(() => Array(24).fill(0));
        const days = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
        
        rawData.forEach(r => {
            try {
                // Tenta converter "DD/MM/YYYY HH:MM:SS"
                const parts = r.timestamp.split(' ');
                const dateParts = parts[0].split('/');
                const timeParts = parts[1].split(':');
                const d = new Date(dateParts[2], dateParts[1]-1, dateParts[0]);
                const day = d.getDay();
                const hour = parseInt(timeParts[0]);
                if(!isNaN(day) && !isNaN(hour)) matrix[day][hour]++;
            } catch(e) {}
        });

        let html = '<div class="heatmap-grid min-w-[800px]"><div class="h-4"></div>';
        for(let h=0; h<24; h++) html += `<div class="text-center text-[9px] text-slate-500">${h}h</div>`;
        
        matrix.forEach((row, d) => {
            html += `<div class="text-[10px] font-bold text-slate-400">${days[d]}</div>`;
            row.forEach(v => {
                const bg = v > 0 ? `rgba(238, 77, 45, ${Math.min(v * 0.3, 1)})` : '#161b22';
                html += `<div class="heatmap-cell" style="background: ${bg}">${v || ''}</div>`;
            });
        });
        document.getElementById('heatmapContainer').innerHTML = html + '</div>';
    }
</script>
</body>
</html>
